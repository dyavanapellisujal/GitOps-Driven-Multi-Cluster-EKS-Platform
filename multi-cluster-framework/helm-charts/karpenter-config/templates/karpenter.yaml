{{- range .Values.karpenter.nodeClasses }}
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: {{ .name }}
spec:
  amiSelectorTerms:
    {{- toYaml .amiSelectorTerms | nindent 4 }}
  subnetSelectorTerms:
    {{- toYaml .subnetSelectorTerms | nindent 4 }}
  securityGroupSelectorTerms:
    {{- toYaml .securityGroupSelectorTerms | nindent 4 }}
  role: {{ .role }}
  {{- if .blockDeviceMappings }}
  blockDeviceMappings:
    {{- toYaml .blockDeviceMappings | nindent 4 }}
  {{- end }}
  {{- if .tags }}
  tags:
    {{- toYaml .tags | nindent 4 }}
  {{- end }}
{{- end }}

{{- range .Values.karpenter.nodePools }}
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: {{ .name }}
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: {{ .nodeClassRef }}
      requirements:
        {{- toYaml .requirements | nindent 8 }}
      {{- if .taints }}
      taints:
        {{- toYaml .taints | nindent 8 }}
      {{- end }}
  {{- if .limits }}
  limits:
    {{- toYaml .limits | nindent 4 }}
  {{- end }}
  disruption:
    {{- toYaml .disruption | nindent 4 }}
{{- end }}
