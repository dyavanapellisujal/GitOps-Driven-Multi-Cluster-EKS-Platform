global:
  repoURL: https://github.com/your-org/helm-charts.git
  revision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=false

clusters:
  - name: region-1-cluster-sets
    destinationName: region-1-cluster
    namespace: region-1

    # Internal services — auto-discovered via Git Generator glob pattern
    sets:
      - name: region-1-app-set
        env: region-1-app
        path: service-*/envs/region-1-values.yaml # ← Glob matches all services
        valueFile: envs/region-1-values.yaml
        project: default
        annotations:
          notifications.argoproj.io/subscribe.on-sync-failed.slack: platform-alerts

      - name: region-1-karpenter-config
        env: region-1-infra
        path: karpenter-config/envs/region-1-values.yaml
        valueFile: envs/region-1-values.yaml
        project: default
        namespace: karpenter

    # External charts — deployed from OCI/Helm registries
    remoteCharts:
      # Karpenter node autoscaler
      - name: karpenter
        env: region-1-infra
        repoURL: oci://public.ecr.aws/karpenter/karpenter
        chart: karpenter
        version: "suitable-version"
        namespace: karpenter
        project: default
        values:
          replicas: 1
          nodeSelector:
            karpenter.sh/controller: "true"
          settings:
            clusterName: my-app-region-1-cluster
            clusterEndpoint: https://ABCDEF1234567890.gr7.your-pre-prod-region.eks.amazonaws.com
            interruptionQueue: Karpenter-my-app-region-1-cluster
            aws:
              defaultRegion: your-pre-prod-region
          tolerations:
            - key: CriticalAddonsOnly
              operator: Exists
            - key: karpenter.sh/controller
              operator: Exists
              effect: NoSchedule
          webhook:
            enabled: false

      # AWS Load Balancer Controller
      - name: aws-load-balancer-controller
        env: region-1-infra
        repoURL: https://aws.github.io/eks-charts
        chart: aws-load-balancer-controller
        version: "suitable-version"
        namespace: kube-system
        project: default
        values:
          clusterName: my-app-region-1-cluster
          region: your-pre-prod-region
          vpcId: vpc-0abc1234def567890
          serviceAccount:
            create: true
            name: aws-load-balancer-controller
          enableCertManager: false

      # KEDA (Kubernetes Event-Driven Autoscaling)
      - name: keda
        env: region-1-infra
        repoURL: https://kedacore.github.io/charts
        chart: keda
        version: "suitable-version"
        namespace: keda
        project: default
        syncOptions:
          - ServerSideApply=true # Avoids 256KB annotation limit on large CRDs
        values: {}

  - name: region-1-another-cluster-sets
    destinationName: region-1-another-cluster
    namespace: region-1

    sets:
      #add your apps like for example grafana etc
